services:
  - type: web
    name: coach-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # à saisir manuellement dans le dashboard Render
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: coach-bot-db
          property: connectionString

databases:
  - name: coach-bot-db
    databaseName: coachbot
    plan: free
